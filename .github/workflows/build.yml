name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.24']
        include:
          - os: ubuntu-latest
            platforms: |
              linux/amd64
              linux/arm64
          - os: macos-latest
            platforms: |
              darwin/amd64
              darwin/arm64
          - os: windows-latest
            platforms: |
              windows/amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build Linux
        if: runner.os == 'Linux'
        run: |
          GOOS=linux GOARCH=amd64 go build -o bin/go_pi-linux-amd64 ./cmd/...
          GOOS=linux GOARCH=arm64 go build -o bin/go_pi-linux-arm64 ./cmd/...

      - name: Build macOS
        if: runner.os == 'macOS'
        run: |
          GOOS=darwin GOARCH=amd64 go build -o bin/go_pi-darwin-amd64 ./cmd/...
          GOOS=darwin GOARCH=arm64 go build -o bin/go_pi-darwin-arm64 ./cmd/...

      - name: Build Windows
        if: runner.os == 'Windows'
        run: |
          go build -o bin/go_pi-windows-amd64.exe ./cmd/...

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-binaries
          path: bin/
